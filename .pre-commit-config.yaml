repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-check
        name: Run Pytest
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true